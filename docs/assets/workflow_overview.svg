<svg width="1400" height="980" viewBox="0 0 1400 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EDAgent workflow overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3d7a"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00695c"/>
      <stop offset="100%" stop-color="#00897b"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6a1b9a"/>
      <stop offset="100%" stop-color="#8e24aa"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b85c00"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="cardE" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#37474f"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#9ab3cc" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a667f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="980" fill="url(#bg)"/>

  <text x="700" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="url(#titleGrad)">
    EDAgent Workflow Overview
  </text>
  <text x="700" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#3f5f7a">
    User task to governed execution, experiment loops, and human-readable reporting
  </text>

  <!-- Main pipeline -->
  <g filter="url(#shadow)">
    <rect x="85" y="130" rx="16" ry="16" width="220" height="92" fill="url(#cardA)"/>
    <rect x="345" y="130" rx="16" ry="16" width="220" height="92" fill="url(#cardB)"/>
    <rect x="605" y="130" rx="16" ry="16" width="220" height="92" fill="url(#cardC)"/>
    <rect x="865" y="130" rx="16" ry="16" width="220" height="92" fill="url(#cardD)"/>
    <rect x="1125" y="130" rx="16" ry="16" width="190" height="92" fill="url(#cardE)"/>
  </g>

  <text x="195" y="168" text-anchor="middle" font-family="Segoe UI, Arial" font-size="25" font-weight="700" fill="#ffffff">User Task</text>
  <text x="195" y="194" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#dbe9ff">Natural language goal</text>

  <text x="455" y="168" text-anchor="middle" font-family="Segoe UI, Arial" font-size="25" font-weight="700" fill="#ffffff">Agent</text>
  <text x="455" y="194" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ddfff9">Intent + policy routing</text>

  <text x="715" y="168" text-anchor="middle" font-family="Segoe UI, Arial" font-size="25" font-weight="700" fill="#ffffff">Skill</text>
  <text x="715" y="194" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#f3ddff">Scoped capability module</text>

  <text x="975" y="168" text-anchor="middle" font-family="Segoe UI, Arial" font-size="25" font-weight="700" fill="#ffffff">EDA Tools</text>
  <text x="975" y="194" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#fff0de">Innovus/STA/scripts/checks</text>

  <text x="1220" y="168" text-anchor="middle" font-family="Segoe UI, Arial" font-size="25" font-weight="700" fill="#ffffff">Result</text>
  <text x="1220" y="194" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#e4eef6">Artifacts + decisions</text>

  <line x1="305" y1="176" x2="345" y2="176" stroke="#4a667f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="565" y1="176" x2="605" y2="176" stroke="#4a667f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="825" y1="176" x2="865" y2="176" stroke="#4a667f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1085" y1="176" x2="1125" y2="176" stroke="#4a667f" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="700" y="268" text-anchor="middle" font-family="Segoe UI, Arial" font-size="28" font-weight="700" fill="#1f4e79">
    Common Workflows
  </text>

  <!-- Workflow cards -->
  <g filter="url(#shadow)">
    <rect x="80" y="300" rx="14" ry="14" width="1240" height="118" fill="#ffffff"/>
    <rect x="80" y="440" rx="14" ry="14" width="1240" height="118" fill="#ffffff"/>
    <rect x="80" y="580" rx="14" ry="14" width="1240" height="118" fill="#ffffff"/>
    <rect x="80" y="720" rx="14" ry="14" width="1240" height="186" fill="#ffffff"/>
  </g>

  <!-- Row 1 -->
  <text x="120" y="334" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#0f3d7a">1) Onboarding / Bootstrap</text>
  <text x="120" y="365" font-family="Consolas, Monaco, monospace" font-size="17" fill="#274b6d">
    git clone -> python run_demo.py -> infra checks -> ask research direction/constraints
  </text>
  <line x1="120" y1="386" x2="1270" y2="386" stroke="#d3e2f1" stroke-width="2"/>
  <text x="120" y="410" font-family="Segoe UI, Arial" font-size="14" fill="#567998">Produces: guard/audit reports, KB index, deployment readiness hints</text>

  <!-- Row 2 -->
  <text x="120" y="474" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#0f3d7a">2) Literature -> Knowledge -> Idea</text>
  <text x="120" y="505" font-family="Consolas, Monaco, monospace" font-size="17" fill="#274b6d">
    paper fetch -> local pdf summary -> landscape update -> idea debate -> hypothesis matrix
  </text>
  <line x1="120" y1="526" x2="1270" y2="526" stroke="#d3e2f1" stroke-width="2"/>
  <text x="120" y="550" font-family="Segoe UI, Arial" font-size="14" fill="#567998">Produces: evidence notes, problem/method landscape, prioritized experiment candidates</text>

  <!-- Row 3 -->
  <text x="120" y="614" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#0f3d7a">3) Experiment Loop</text>
  <text x="120" y="645" font-family="Consolas, Monaco, monospace" font-size="17" fill="#274b6d">
    theory-veto -> implementation -> run -> validation -> retro -> next iteration
  </text>
  <line x1="120" y1="666" x2="1270" y2="666" stroke="#d3e2f1" stroke-width="2"/>
  <text x="120" y="690" font-family="Segoe UI, Arial" font-size="14" fill="#567998">Produces: metrics (power/area/timing), pass/fail decisions, mechanism-based next actions</text>

  <!-- Row 4 -->
  <text x="120" y="754" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#0f3d7a">4) Reporting and Continuous Improvement</text>
  <text x="120" y="785" font-family="Consolas, Monaco, monospace" font-size="17" fill="#274b6d">
    user question -> targeted summary/slides -> feedback capture -> SOP/tool/skill update
  </text>
  <line x1="120" y1="806" x2="1270" y2="806" stroke="#d3e2f1" stroke-width="2"/>
  <text x="120" y="830" font-family="Segoe UI, Arial" font-size="14" fill="#567998">Produces: concise human-readable outputs and progressively improved workflows</text>

  <!-- Feedback loop visual -->
  <path d="M1130,850 C1230,850 1250,760 1140,735" fill="none" stroke="#1f4e79" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1180" y="905" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#1f4e79">Feedback loop</text>

</svg>
