<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Workflow decision and evolution loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#ebf4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#9fb3c8" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5d7893"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text x="700" y="52" text-anchor="middle" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#123f73">Agent Workflow Decision and Evolution Loop</text>
  <text x="700" y="80" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#4f6f8d">Agent first decides workflow class, then routes skills; unknown patterns can become new workflows</text>

  <!-- Top rail -->
  <g filter="url(#shadow)">
    <rect x="80" y="130" width="230" height="92" rx="14" fill="#1f5ca8"/>
    <rect x="360" y="130" width="270" height="92" rx="14" fill="#00796b"/>
    <rect x="680" y="118" width="240" height="116" rx="18" fill="#7b1fa2"/>
  </g>
  <text x="195" y="167" text-anchor="middle" font-family="Segoe UI, Arial" font-size="25" font-weight="700" fill="#fff">User Task</text>
  <text x="495" y="167" text-anchor="middle" font-family="Segoe UI, Arial" font-size="25" font-weight="700" fill="#fff">Agent Parse</text>
  <text x="495" y="193" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ddfff9">intent + constraints</text>
  <text x="800" y="167" text-anchor="middle" font-family="Segoe UI, Arial" font-size="25" font-weight="700" fill="#fff">Known Workflow?</text>
  <text x="800" y="193" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#f1ddff">decision gate</text>

  <line x1="310" y1="176" x2="360" y2="176" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="630" y1="176" x2="680" y2="176" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- YES branch -->
  <g filter="url(#shadow)">
    <rect x="1010" y="110" width="320" height="92" rx="14" fill="#0d47a1"/>
    <rect x="1010" y="230" width="320" height="92" rx="14" fill="#1565c0"/>
    <rect x="1010" y="350" width="320" height="92" rx="14" fill="#455a64"/>
  </g>
  <text x="960" y="152" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#1b4f7e">YES</text>
  <line x1="920" y1="156" x2="1010" y2="156" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="1170" y="147" text-anchor="middle" font-family="Segoe UI, Arial" font-size="23" font-weight="700" fill="#fff">Select Skill Subset</text>
  <text x="1170" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#dbe9ff">within matched workflow</text>

  <text x="1170" y="267" text-anchor="middle" font-family="Segoe UI, Arial" font-size="23" font-weight="700" fill="#fff">Execute + Validate</text>
  <text x="1170" y="294" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#dbe9ff">skill -> tools -> artifacts</text>

  <text x="1170" y="387" text-anchor="middle" font-family="Segoe UI, Arial" font-size="23" font-weight="700" fill="#fff">Result to User</text>
  <text x="1170" y="414" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#e4eef6">summary/slides/metrics</text>

  <line x1="1170" y1="202" x2="1170" y2="230" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1170" y1="322" x2="1170" y2="350" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- NO branch -->
  <g filter="url(#shadow)">
    <rect x="120" y="300" width="320" height="92" rx="14" fill="#6a1b9a"/>
    <rect x="120" y="420" width="320" height="92" rx="14" fill="#8e24aa"/>
    <rect x="120" y="540" width="320" height="92" rx="14" fill="#00695c"/>
    <rect x="120" y="660" width="320" height="92" rx="14" fill="#00796b"/>
  </g>

  <text x="650" y="235" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#7a3d00">NO</text>
  <path d="M680,210 C520,230 450,280 440,334" fill="none" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="280" y="337" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#fff">Temporary Flow</text>
  <text x="280" y="364" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#f1ddff">safe exploratory chain</text>

  <text x="280" y="457" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#fff">Execute + Observe</text>
  <text x="280" y="484" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#f1ddff">steps, failures, recoveries</text>

  <text x="280" y="577" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#fff">Capture Feedback</text>
  <text x="280" y="604" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#d7fff7">user habits + preferences</text>

  <text x="280" y="697" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#fff">Create New Workflow</text>
  <text x="280" y="724" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#d7fff7">register subset + SOP</text>

  <line x1="280" y1="392" x2="280" y2="420" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="280" y1="512" x2="280" y2="540" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="280" y1="632" x2="280" y2="660" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- convergence -->
  <path d="M440,706 C700,706 820,520 1010,396" fill="none" stroke="#5d7893" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="720" y="676" font-family="Segoe UI, Arial" font-size="14" fill="#3e5f7f">future similar tasks now route as known workflow</text>

  <!-- footer notes -->
  <rect x="80" y="790" width="1240" height="86" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <text x="108" y="826" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#12406f">Key Meaning</text>
  <text x="108" y="852" font-family="Segoe UI, Arial" font-size="15" fill="#31526f">Known task: workflow -> skill subset -> execute. New task: temporary run -> feedback -> create new workflow + SOP, so the system improves with usage.</text>
</svg>
